<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Data4Ghana</title>
    
    <link rel="stylesheet" href="css/admin-login.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <!-- Supabase Database Connection --><script src="js/supabase.js"></script>
    <script src="js/security.js"></script>
</head>
<body class="admin-auth-bg">

    <!-- GLOBAL RETURN NAV -->
    <button class="return-home" onclick="window.location.href='index.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Return to Public Site
    </button>

    <div class="login-container">
        
        <div class="brand-panel">
            <div class="shield-icon">🛡️</div>
            <h2>Admin Control Panel</h2>
            <p>Secure administrative access. Only authorized Data4Ghana staff may enter.</p>
        </div>

        <div class="form-panel">
            <h3>Staff Login</h3>
            <p id="errorMsg" class="error-banner" style="display: none;"></p>

            <form id="adminLoginForm">
                <div class="input-group">
                    <label>Administrator Email</label>
                    <div class="input-with-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                        <input type="email" id="email" placeholder="data4ghana1@gmail.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Secure Password</label>
                    <div class="input-with-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Authenticate to Dashboard</button>
                
                <p class="security-notice">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                    All access attempts are logged securely.
                </p>
            </form>
        </div>

    </div>

    <script src="js/admin-login.js"></script>
</body>
</html>
