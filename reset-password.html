<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password - Data4Ghana</title>

<link rel="stylesheet" href="css/login.css">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/security.js"></script>

<!-- Supabase Database Connection --><script src="js/supabase.js"></script>

<style>
  .success-box {
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: #166534;
    margin-bottom: 20px;
    line-height: 1.5;
    display: none;
  }
  .error-box {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: #991b1b;
    margin-bottom: 20px;
    line-height: 1.5;
    display: none;
  }
</style>

</head>

<body>

<div class="login-container">

<a class="back" href="login.html">← Back to Sign In</a>

<div class="logo">
<h2>📱 Data4Ghana</h2>
<p>Set your new password</p>
</div>

<div class="card">

<h1>Reset Password</h1>
<p class="subtitle">Enter your new password below</p>

<div class="success-box" id="successBox"></div>
<div class="error-box" id="errorBox"></div>

<form id="resetForm">

<label>New Password</label>
<div class="password-box">
<input type="password" id="newPassword" placeholder="Enter new password" required minlength="8">
<span onclick="toggleNew()">👁</span>
</div>

<label>Confirm New Password</label>
<div class="password-box">
<input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8">
<span onclick="toggleConfirm()">👁</span>
</div>

<button type="submit" id="resetBtn">Update Password</button>

</form>

</div>

</div>

<script>
function toggleNew() {
  let p = document.getElementById("newPassword");
  p.type = p.type === "password" ? "text" : "password";
}

function toggleConfirm() {
  let p = document.getElementById("confirmPassword");
  p.type = p.type === "password" ? "text" : "password";
}

document.getElementById("resetForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const newPass = document.getElementById("newPassword").value;
  const confirmPass = document.getElementById("confirmPassword").value;
  const btn = document.getElementById("resetBtn");
  const successBox = document.getElementById("successBox");
  const errorBox = document.getElementById("errorBox");

  successBox.style.display = "none";
  errorBox.style.display = "none";

  if (newPass !== confirmPass) {
    errorBox.innerHTML = "<strong>❌</strong> Passwords do not match.";
    errorBox.style.display = "block";
    return;
  }

  if (newPass.length < 8) {
    errorBox.innerHTML = "<strong>❌</strong> Password must be at least 8 characters long.";
    errorBox.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Updating Password...";

  try {
    const { data, error } = await supabase.auth.updateUser({
      password: newPass
    });

    if (error) throw error;

    // Send SMS confirmation
    if (data?.user) {
      try {
        const { data: userData } = await supabase
          .from("users")
          .select("phone, first_name")
          .eq("id", data.user.id)
          .single();

        if (userData?.phone) {
          const SUPABASE_FUNCTIONS_URL = "https://wynmejzsybkxhqvazjzu.supabase.co/functions/v1";
          await fetch(`${SUPABASE_FUNCTIONS_URL}/send-sms`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({
              to: userData.phone,
              msg: `Dear ${userData.first_name || 'Customer'}, your Data4Ghana password has been successfully changed. If you did not make this change, contact support immediately at support@data4ghana.com`,
              sender_id: 'Data4Ghana'
            }),
          });
        }
      } catch(smsErr) {
        console.error("SMS confirmation failed:", smsErr);
      }
    }

    successBox.innerHTML = "<strong>✅ Password updated successfully!</strong><br>Redirecting to login...";
    successBox.style.display = "block";
    btn.innerText = "Password Updated ✓";
    btn.style.background = "#059669";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 2000);

  } catch(err) {
    errorBox.innerHTML = `<strong>❌ Error:</strong> ${err.message}`;
    errorBox.style.display = "block";
    btn.disabled = false;
    btn.innerText = "Update Password";
  }
});
</script>

</body>
</html>
