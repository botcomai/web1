<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance | Data4Ghana</title>
    <script src="js/security.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3c72;
            --secondary: #2a5298;
            --accent: #2563eb;
            --text: #0f172a;
            --bg: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            margin: 20px;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 24px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 16px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #64748b;
            margin-bottom: 30px;
        }

        .badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--accent);
            border-radius: 100px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
        }

        .contact {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e1e8ed;
            font-size: 15px;
            color: #94a3b8;
        }

        .contact a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="logo">Data4Ghana</span>
        <div class="icon">🛠️</div>
        <div class="badge">Scheduled System Update</div>
        <h1>We'll be back shortly!</h1>
        <p>Our team is currently performing essential system maintenance to enhance your experience. We apologize for any inconvenience caused.</p>
        
        <div class="contact">
            Need urgent assistance? Contact us at<br>
            <a href="https://wa.me/233559623850">WhatsApp Support</a> or <a href="mailto:support@data4ghana.com">support@data4ghana.com</a>
        </div>
    </div>
</body>
</html>
